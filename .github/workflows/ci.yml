name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/.env"
      - "**/.env.*"
  push:
    branches:
      - main
    paths-ignore:
      - "**/.env"
      - "**/.env.*"

permissions:
  contents: read

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "These files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Go Vet
        run: go vet ./...

      - name: Go Test
        run: go test -race ./...

  docker-build:
    runs-on: ubuntu-latest
    needs: go-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Build
        run: docker build -t food-delivery-backend:ci .
